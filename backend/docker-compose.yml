version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=notes_db
    ports:
      - "5432:5432"
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password123@db:5432/notes_db
    depends_on:
      - db
    volumes:
      - .:/code